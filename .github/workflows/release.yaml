name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix:
        target:
          - os: linux
            arch: x86_64
            zig_target: x86_64-linux
          - os: linux
            arch: aarch64
            zig_target: aarch64-linux
          - os: macos
            arch: x86_64
            zig_target: x86_64-macos
          - os: macos
            arch: aarch64
            zig_target: aarch64-macos
          - os: windows
            arch: x86_64
            zig_target: x86_64-windows
          - os: windows
            arch: aarch64
            zig_target: aarch64-windows

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2

      - name: Build for ${{ matrix.target.os }}-${{ matrix.target.arch }}
        run: |
          zig build -Dtarget=${{ matrix.target.zig_target }} --release=small

      - name: Package binaries
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          STAGING_DIR="neutils-${VERSION}-${{ matrix.target.os }}-${{ matrix.target.arch }}"
          mkdir -p "${STAGING_DIR}"

          if [[ "${{ matrix.target.os }}" == "windows" ]]; then
            cp zig-out/bin/*.exe "${STAGING_DIR}/"
          else
            cp zig-out/bin/* "${STAGING_DIR}/"
          fi

          cp README.md LICENSE "${STAGING_DIR}/"

          mkdir -p artifacts
          if [[ "${{ matrix.target.os }}" == "windows" ]]; then
            zip -r "artifacts/${STAGING_DIR}.zip" "${STAGING_DIR}"
          else
            tar -czf "artifacts/${STAGING_DIR}.tar.gz" "${STAGING_DIR}"
          fi

          # Per-tool archives
          for bin in zig-out/bin/*; do
            TOOL_NAME=$(basename "${bin}" .exe)
            TOOL_DIR="${TOOL_NAME}-${VERSION}-${{ matrix.target.os }}-${{ matrix.target.arch }}"
            mkdir -p "${TOOL_DIR}"
            cp "${bin}" "${TOOL_DIR}/"
            cp README.md LICENSE "${TOOL_DIR}/"
            if [[ "${{ matrix.target.os }}" == "windows" ]]; then
              zip -r "artifacts/${TOOL_DIR}.zip" "${TOOL_DIR}"
            else
              tar -czf "artifacts/${TOOL_DIR}.tar.gz" "${TOOL_DIR}"
            fi
          done

          ls -la artifacts/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: neutils-${{ matrix.target.os }}-${{ matrix.target.arch }}
          path: artifacts/

      - name: Stage raw binaries for npm artifact
        shell: bash
        run: |
          case "${{ matrix.target.os }}"   in macos)   nos=darwin ;; windows) nos=win32 ;; *) nos="${{ matrix.target.os }}" ;; esac
          case "${{ matrix.target.arch }}" in x86_64) ncpu=x64 ;; aarch64) ncpu=arm64 ;; *) ncpu="${{ matrix.target.arch }}" ;; esac
          mkdir -p npm-bin/${nos}-${ncpu}/bin
          cp zig-out/bin/* npm-bin/${nos}-${ncpu}/bin/

      - name: Upload raw binaries (for npm publish)
        uses: actions/upload-artifact@v4
        with:
          name: npm-bin-${{ matrix.target.os }}-${{ matrix.target.arch }}
          path: npm-bin/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        id: changelog
        with:
          args: --latest --strip header

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find release-artifacts -name "*.tar.gz" -type f -exec cp {} release-assets/ \;
          find release-artifacts -name "*.zip" -type f -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          body: ${{ steps.changelog.outputs.content }}
          draft: false
          prerelease: false

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up mise (zig + bun + node)
        uses: jdx/mise-action@v4
        with:
          experimental: true
          install_args: "zig bun node"

      - name: Download pre-built binaries from build matrix
        uses: actions/download-artifact@v4
        with:
          pattern: npm-bin-*
          path: zig-out/npm-bin
          merge-multiple: true

      - name: Install Bun dev deps
        run: bun install --frozen-lockfile

      - name: Build + publish to npm
        run: mise run npm-publish
